---
# Bundles three values:
#   - secret-key      Django SECRET_KEY (PAPERLESS_SECRET_KEY)
#   - admin-password  First-boot superuser password (PAPERLESS_ADMIN_PASSWORD)
#   - redis-password  Auth for the bundled bitnami/redis subchart
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: paperless-secrets
  namespace: {{ .Release.Namespace }}
spec:
  encryptedData:
    secret-key: 
    admin-password: 
    redis-password: 
  template:
    metadata:
      name: paperless-secrets
      namespace: {{ .Release.Namespace }}
    type: Opaque
