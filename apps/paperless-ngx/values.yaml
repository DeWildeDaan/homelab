# Knobs for the in-repo Gotenberg + Tika + Redis + Postgres sidecars
# (templates/{gotenberg,tika,redis,postgres}.yaml). Paperless wires to them via
# PAPERLESS_TIKA_*, PAPERLESS_REDIS, and PAPERLESS_DB* env below.
gotenberg:
  image: gotenberg/gotenberg:8.32.0
tika:
  image: apache/tika:2.9.2.1-full
redis:
  image: redis:7.4-alpine

# Postgres — same pattern as immich (templates/postgres.yaml). Bitnami removed
# docker.io/bitnami/postgresql from Docker Hub on 2025-08-28, so we replace the
# bundled subchart with a vanilla postgres Deployment.
postgres:
  image: postgres:16-alpine
  database: paperless
  username: paperless
  storage:
    size: 10Gi
    # local-path (k3s default) — same reasoning as immich: Synology NFS
    # all-squash hides the in-container UID and postgres init refuses to
    # chown PGDATA. Single-replica, so single-node pinning is fine.
    storageClass: local-path
    accessMode: ReadWriteOnce

ingress:
  host: paperless.home.daandewilde.be

# ---------------------------------------------------------------------------
# Upstream gabe565/paperless-ngx chart values
# ---------------------------------------------------------------------------
paperless-ngx:
  image:
    repository: ghcr.io/paperless-ngx/paperless-ngx
    tag: "2.14.7"

  env:
    TZ: Europe/Brussels
    # The chart only sets PAPERLESS_URL when its own ingress is enabled; we use
    # a Traefik IngressRoute instead, so set it explicitly here.
    PAPERLESS_URL: https://paperless.home.daandewilde.be
    PAPERLESS_OCR_LANGUAGE: eng+nld
    # Singular OCR_LANGUAGE above picks which packs to use; the plural
    # OCR_LANGUAGES below tells the entrypoint which extra tesseract-ocr-*
    # packs to apt-install at boot (eng ships in the base image).
    PAPERLESS_OCR_LANGUAGES: nld
    # Django secret — sealed in templates/paperless-secrets-sealedsecret.yaml.
    PAPERLESS_SECRET_KEY:
      valueFrom:
        secretKeyRef:
          name: paperless-secrets
          key: secret-key
    # Office-doc pipeline → in-repo Gotenberg + Tika services.
    PAPERLESS_TIKA_ENABLED: "1"
    PAPERLESS_TIKA_ENDPOINT: http://paperless-tika:9998
    PAPERLESS_TIKA_GOTENBERG_ENDPOINT: http://paperless-gotenberg:3000
    # First-boot superuser — paperless skips creation if it already exists.
    PAPERLESS_ADMIN_USER: admin
    PAPERLESS_ADMIN_PASSWORD:
      valueFrom:
        secretKeyRef:
          name: paperless-secrets
          key: admin-password
    # Celery broker → in-repo redis (templates/redis.yaml). The bjw-s common
    # chart sorts env vars alphabetically, so the `A_` prefix guarantees
    # REDIS_PASSWORD is materialised before $(...) expansion in PAPERLESS_REDIS.
    A_REDIS_PASSWORD:
      valueFrom:
        secretKeyRef:
          name: paperless-secrets
          key: redis-password
    PAPERLESS_REDIS: redis://:$(A_REDIS_PASSWORD)@paperless-redis:6379
    # Database → in-repo postgres (templates/postgres.yaml). Subchart is
    # disabled below; these vars take the place of what common.yaml would
    # have emitted.
    PAPERLESS_DBENGINE: postgresql
    PAPERLESS_DBHOST: paperless-postgres
    PAPERLESS_DBNAME: paperless
    PAPERLESS_DBUSER: paperless
    PAPERLESS_DBPASS:
      valueFrom:
        secretKeyRef:
          name: paperless-postgres
          key: postgres-password

  # All four paperless volumes on the Synology over NFS (RWX).
  persistence:
    data:
      enabled: true
      storageClass: nfs-nas
      accessMode: ReadWriteMany
      size: 5Gi
    media:
      enabled: true
      storageClass: nfs-nas
      accessMode: ReadWriteMany
      size: 150Gi
    consume:
      enabled: true
      storageClass: nfs-nas
      accessMode: ReadWriteMany
      size: 5Gi
    export:
      enabled: true
      storageClass: nfs-nas
      accessMode: ReadWriteMany
      size: 5Gi

  # Postgres — bundled bitnami subchart disabled; replaced by the in-repo
  # Deployment in templates/postgres.yaml (same pattern as immich). Bitnami
  # removed docker.io/bitnami/postgresql from Docker Hub on 2025-08-28.
  postgresql:
    enabled: false

  # Redis — bundled bitnami/redis subchart disabled; replaced by the in-repo
  # Deployment in templates/redis.yaml. Bitnami removed docker.io/bitnami/redis
  # from Docker Hub on 2025-08-28 (chart still pins the deleted tag), so we
  # run plain redis:7-alpine ourselves and wire it via PAPERLESS_REDIS above.
  redis:
    enabled: false
