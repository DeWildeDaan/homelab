# Domain base — each app gets its own subdomain via templates/ingressroute.yaml.
ingress:
  host: home.daandewilde.be

storage:
  # Single shared PVC for torrents/usenet/media (TRaSH layout)
  dataSize: 4Ti

# Static IP for direct LAN/Chromecast access to Jellyfin.
jellyfinLoadBalancerIP: 192.168.4.35

# Shared LSIO container settings
puid: &puid "1000"
pgid: &pgid "1000"
tz: &tz Europe/Brussels

# ===========================================================================
# Indexer / automation tier
# ===========================================================================

prowlarr:
  fullnameOverride: prowlarr

  controllers:
    prowlarr:
      containers:
        app:
          image:
            repository: lscr.io/linuxserver/prowlarr
            tag: 2.4.0-nightly
          env:
            PUID: *puid
            PGID: *pgid
            TZ: *tz

  service:
    app:
      controller: prowlarr
      ports:
        http:
          port: 9696

  persistence:
    config:
      enabled: true
      type: persistentVolumeClaim
      storageClass: longhorn
      nameOverride: config-lh
      accessMode: ReadWriteOnce
      size: 2Gi
      advancedMounts:
        prowlarr:
          app:
            - path: /config

sonarr:
  fullnameOverride: sonarr

  controllers:
    sonarr:
      containers:
        app:
          image:
            repository: lscr.io/linuxserver/sonarr
            tag: 4.0.19
          env:
            PUID: *puid
            PGID: *pgid
            TZ: *tz

  service:
    app:
      controller: sonarr
      ports:
        http:
          port: 8989

  persistence:
    config:
      enabled: true
      type: persistentVolumeClaim
      storageClass: longhorn
      nameOverride: config-lh
      accessMode: ReadWriteOnce
      size: 2Gi
      advancedMounts:
        sonarr:
          app:
            - path: /config

    data:
      enabled: true
      type: persistentVolumeClaim
      existingClaim: data-volume
      advancedMounts:
        sonarr:
          app:
            - path: /data

radarr:
  fullnameOverride: radarr

  controllers:
    radarr:
      containers:
        app:
          image:
            repository: lscr.io/linuxserver/radarr
            tag: 6.2.0-nightly
          env:
            PUID: *puid
            PGID: *pgid
            TZ: *tz

  service:
    app:
      controller: radarr
      ports:
        http:
          port: 7878

  persistence:
    config:
      enabled: true
      type: persistentVolumeClaim
      storageClass: longhorn
      nameOverride: config-lh
      accessMode: ReadWriteOnce
      size: 2Gi
      advancedMounts:
        radarr:
          app:
            - path: /config

    data:
      enabled: true
      type: persistentVolumeClaim
      existingClaim: data-volume
      advancedMounts:
        radarr:
          app:
            - path: /data

# FlareSolverr — internal only
flaresolverr:
  fullnameOverride: flaresolverr

  controllers:
    flaresolverr:
      containers:
        app:
          image:
            repository: docker.io/21hsmw/flaresolverr
            tag: nodriver
          env:
            LOG_LEVEL: info
            TZ: *tz

  service:
    app:
      controller: flaresolverr
      ports:
        http:
          port: 8191

# ===========================================================================
# Download tier
# ===========================================================================

qbittorrent:
  fullnameOverride: qbittorrent

  controllers:
    qbittorrent:
      containers:
        gluetun:
          image:
            repository: ghcr.io/qdm12/gluetun
            tag: v3.41.1
          env:
            VPN_SERVICE_PROVIDER: mullvad
            VPN_TYPE: wireguard
            SERVER_CITIES: Amsterdam
            FIREWALL_INPUT_PORTS: "8080"
            FIREWALL_OUTBOUND_SUBNETS: "10.42.0.0/16,10.43.0.0/16"
            HEALTH_VPN_DURATION_INITIAL: 20s
            WIREGUARD_MTU: "1320"
          envFrom:
            - secretRef:
                name: servarr-vpn
          securityContext:
            capabilities:
              add: ["NET_ADMIN"]

        app:
          image:
            repository: lscr.io/linuxserver/qbittorrent
            tag: 5.2.3
          env:
            PUID: *puid
            PGID: *pgid
            TZ: *tz
            WEBUI_PORT: "8080"

  service:
    app:
      controller: qbittorrent
      ports:
        http:
          port: 8080

  persistence:
    config:
      enabled: true
      type: persistentVolumeClaim
      storageClass: longhorn
      nameOverride: config-lh
      accessMode: ReadWriteOnce
      size: 2Gi
      advancedMounts:
        qbittorrent:
          app:
            - path: /config

    data:
      enabled: true
      type: persistentVolumeClaim
      existingClaim: data-volume
      advancedMounts:
        qbittorrent:
          app:
            - path: /data

# ===========================================================================
# Streaming tier
# ===========================================================================

jellyseerr:
  fullnameOverride: jellyseerr

  controllers:
    jellyseerr:
      containers:
        app:
          image:
            repository: docker.io/fallenbagel/jellyseerr
            tag: "preview-OIDC"
          env:
            TZ: *tz
            LOG_LEVEL: info

  service:
    app:
      controller: jellyseerr
      ports:
        http:
          port: 5055

  persistence:
    config:
      enabled: true
      type: persistentVolumeClaim
      storageClass: longhorn
      nameOverride: config-lh
      accessMode: ReadWriteOnce
      size: 2Gi
      advancedMounts:
        jellyseerr:
          app:
            - path: /app/config

jellyfin:
  fullnameOverride: jellyfin

  controllers:
    jellyfin:
      containers:
        app:
          image:
            repository: docker.io/jellyfin/jellyfin
            tag: "10.11.11"
          env:
            TZ: *tz
            JELLYFIN_PublishedServerUrl: https://jellyfin.home.daandewilde.be

  service:
    app:
      controller: jellyfin
      type: LoadBalancer
      loadBalancerIP: 192.168.4.35
      externalTrafficPolicy: Cluster

      ports:
        http:
          port: 8096

  persistence:
    config:
      enabled: true
      type: persistentVolumeClaim
      storageClass: longhorn
      nameOverride: config-lh
      accessMode: ReadWriteOnce
      size: 20Gi
      advancedMounts:
        jellyfin:
          app:
            - path: /config

    cache:
      enabled: true
      type: emptyDir
      sizeLimit: 10Gi
      advancedMounts:
        jellyfin:
          app:
            - path: /cache

    data:
      enabled: true
      type: persistentVolumeClaim
      existingClaim: data-volume
      advancedMounts:
        jellyfin:
          app:
            - path: /data
              readOnly: true

