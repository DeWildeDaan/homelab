app-template:
  controllers:
    adguard:
      containers:
        app:
          image:
            repository: adguard/adguardhome
            tag: v0.107.77
          env:
            TZ: Europe/Brussels
          # Default app-template probes hit the first container port; AdGuard
          # only listens on 3000 until the setup wizard finishes, so pin both
          # probes to 3000 explicitly.
          probes:
            liveness:
              custom: true
              spec:
                tcpSocket:
                  port: 3000
                initialDelaySeconds: 30
                periodSeconds: 10
            readiness:
              custom: true
              spec:
                tcpSocket:
                  port: 3000
                initialDelaySeconds: 10
                periodSeconds: 10

  service:
    # DNS + initial-setup web — exposed on the LAN via MetalLB.
    dns:
      controller: adguard
      type: LoadBalancer
      loadBalancerIP: 192.168.4.31
      externalTrafficPolicy: Cluster
      ports:
        dns-udp:
          port: 53
          protocol: UDP
        dns-tcp:
          port: 53
          protocol: TCP
        setup:
          port: 3000
        web:
          port: 80
    # Cluster-internal handle for the Traefik IngressRoute.
    web:
      controller: adguard
      ports:
        http:
          port: 80

  persistence:
    config:
      enabled: true
      type: persistentVolumeClaim
      storageClass: nfs-nas
      accessMode: ReadWriteMany
      size: 1Gi
      advancedMounts:
        adguard:
          app:
            - path: /opt/adguardhome/conf
    work:
      enabled: true
      type: persistentVolumeClaim
      storageClass: nfs-nas
      accessMode: ReadWriteMany
      size: 5Gi
      advancedMounts:
        adguard:
          app:
            - path: /opt/adguardhome/work
