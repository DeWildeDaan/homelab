apiVersion: v2
name: trivy
description: Umbrella chart for Trivy Operator (cluster vulnerability scanning) and Trivy Operator Dashboard (web UI)
type: application
version: 1.0.0
appVersion: "1.0.0"

dependencies:
  - name: trivy-operator
    version: "0.34.0"
    repository: "https://aquasecurity.github.io/helm-charts/"
    alias: trivy-operator

  - name: trivy-operator-dashboard
    version: "1.9.0"
    repository: "oci://ghcr.io/raoulx24/charts"
    alias: dashboard