pocket-id:
  encryptionKey: "CHANGE_ME_BASE64_32B"   # REQUIRED
  database:
    provider: sqlite
  timeZone: "Europe/Brussels"
  trustProxy: true

  service:
    type: LoadBalancer
    loadBalancerIP: 192.168.4.36

  ingress:
    enabled: false

  persistence:
    data:
      enabled: true
      size: 5Gi
      storageClass: "longhorn"

  config:
    analyticsDisabled: true
    ui:
      useDefaults: true
      settings:
        app:
          appName: "Pocket ID"
          allowUserSignups: "disabled"
          sessionDuration: 120
    core:
      logLevel: info
      logJson: true
      disableRateLimiting: false
      auditLogRetentionDays: 90
      baseURL: "https://auth.home.daandewilde.be"