pocket-id:
  host: "auth.home.daandewilde.be"
  database:
    provider: sqlite
  timeZone: "Europe/Brussels"
  trustProxy: true

  secret:
    create: false
    name: "pocket-id-secret"

  service:
    type: LoadBalancer
    loadBalancerIP: 192.168.4.36

  ingress:
    enabled: false

  persistence:
    data:
      enabled: true
      size: 5Gi
      storageClass: "longhorn"

  config:
    analyticsDisabled: true

    core:
      logJson: true
      internalAppUrl: "https://auth.home.daandewilde.be:80"