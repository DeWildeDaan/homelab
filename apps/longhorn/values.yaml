ingress:
  host: longhorn.home.daandewilde.be

longhorn:
  defaultSettings:
    defaultReplicaCount: 3
    storageMinimalAvailablePercentage: 10
    nodeDownPodDeletionPolicy: delete-both-statefulset-and-deployment-pod

  persistence:
    defaultClass: true
    defaultClassReplicaCount: 3

  defaultBackupStore:
    backupTarget: "nfs://192.168.4.10:/volume1/Backups-Longhorn"
  
  preUpgradeChecker:
    jobEnabled: false

  ingress:
    enabled: false