it-tools:
  replicaCount: 1

  image:
    repository: ghcr.io/corentinth/it-tools
    tag: "2026.1.4"
    pullPolicy: IfNotPresent

  service:
    type: ClusterIP
    port: 80

  ingress:
    enabled: false  # We manage ingress via Traefik IngressRoute

  resources:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 64Mi