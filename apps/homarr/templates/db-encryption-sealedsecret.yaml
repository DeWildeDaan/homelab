---
# Homarr's at-rest DB encryption key (SECRET_ENCRYPTION_KEY).
# Generate the ciphertext once with kubeseal --raw and paste below:
#
#   openssl rand -hex 32 | tr -d '\n' | kubeseal \
#     --controller-name sealed-secrets-controller \
#     --controller-namespace sealed-secrets \
#     --raw \
#     --namespace homarr \
#     --name homarr-db-encryption
#
# Losing/rotating this key after first boot makes the existing homarr DB
# unreadable, so back the cleartext value up somewhere safe.
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: homarr-db-encryption
  namespace: {{ .Release.Namespace }}
spec:
  encryptedData:
    db-encryption-key: 
  template:
    metadata:
      name: homarr-db-encryption
      namespace: {{ .Release.Namespace }}
    type: Opaque
