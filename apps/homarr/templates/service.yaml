apiVersion: v1
kind: Service
metadata:
  name: homarr
  namespace: {{ .Release.Namespace }}
spec:
  type: LoadBalancer
  loadBalancerIP: 192.168.4.34
  externalTrafficPolicy: Cluster
  selector:
    app.kubernetes.io/name: homarr
    app.kubernetes.io/instance: homarr
  ports:
    - name: app
      port: 7575
      targetPort: http
      protocol: TCP
