sourcePVC: "temp-longhorn-pvc"
destinationPVC: "paperless-postgres-data"

namespace: "paperless-ngx"
size: 10Gi

image: alpine:3.20

command:
  - /bin/sh
  - -c
  - |
    apk add --no-cache rsync &&
    echo "Starting migration..." &&
    rsync -aHAXv /source/ /dest/ &&
    echo "Done."