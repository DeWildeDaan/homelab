sourcePVC: "maintainerr-config"
destinationPVC: "temp-maintainerr-config"


tempPVCName: "temp-maintainerr-config"

namespace: "servarr"
size: 5Gi

image: alpine:3.20

command:
  - /bin/sh
  - -c
  - |
    apk add --no-cache rsync &&
    echo "Starting migration..." &&
    rsync -aHAXv /source/ /dest/ &&
    echo "Done."