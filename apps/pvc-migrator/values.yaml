# sourcePVC: "bazarr-config"
sourcePVC: "temp-longhorn-pvc"
destinationPVC: "bazarr-config-lh"

namespace: "servarr"
size: 2Gi

image: alpine:3.20

command:
  - /bin/sh
  - -c
  - |
    apk add --no-cache rsync &&
    echo "Starting migration..." &&
    rsync -aHAXv /source/ /dest/ &&
    echo "Done."