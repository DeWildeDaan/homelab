---
# Superuser (`postgres`) credentials for the Immich CNPG cluster (immich-db.yaml).
# Immich connects as `postgres` (as it did on the old DIY DB), so the cluster runs
# with enableSuperuserAccess + superuserSecret pointing here. Keeps the credential
# in Git per the SealedSecrets standard instead of letting CNPG auto-generate it.
# Consumed by: CNPG (sets the postgres password) and Immich (DB_PASSWORD).
# Must be type kubernetes.io/basic-auth with username `postgres`.
#
# Re-seal (namespace + name are baked into the ciphertext — keep both exactly):
#   echo -n 'postgres' | kubeseal --controller-name sealed-secrets-controller \
#     --controller-namespace sealed-secrets --raw \
#     --namespace immich --name immich-db-superuser        # → username
#   echo -n 'REPLACE_ME' | kubeseal --controller-name sealed-secrets-controller \
#     --controller-namespace sealed-secrets --raw \
#     --namespace immich --name immich-db-superuser        # → password
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: immich-db-superuser
  namespace: immich
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  encryptedData:
    username: 
    password: 
  template:
    metadata:
      name: immich-db-superuser
      namespace: immich
    type: kubernetes.io/basic-auth
