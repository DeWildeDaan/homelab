---
# Application-role credentials for the Paperless CNPG cluster(s). Referenced
# explicitly via bootstrap.initdb.secret.name in paperless-db.yaml, so it's
# version-INDEPENDENT: every paperless-db-<major> cluster reuses this one secret,
# and Paperless's PAPERLESS_DBPASS ref never changes across major upgrades.
#
# Lives in the `paperless-ngx` namespace (explicit — this chart's release ns is
# cloudnative-pg) so both CNPG (cluster runs there) and the Paperless pod can
# read it. Must be type kubernetes.io/basic-auth; `username` must match the
# cluster owner (`paperless`). Synced before the Cluster (wave 1 < 2).
#
# Re-seal (namespace + name are baked into the ciphertext — keep both exactly):
#   echo -n 'paperless' | kubeseal --controller-name sealed-secrets-controller \
#     --controller-namespace sealed-secrets --raw \
#     --namespace paperless-ngx --name paperless-db-app   # → username
#   echo -n 'REPLACE_ME' | kubeseal --controller-name sealed-secrets-controller \
#     --controller-namespace sealed-secrets --raw \
#     --namespace paperless-ngx --name paperless-db-app   # → password
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: paperless-db-app
  namespace: paperless-ngx
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  encryptedData:
    username: 
    password: 
  template:
    metadata:
      name: paperless-db-app
      namespace: paperless-ngx
    type: kubernetes.io/basic-auth
