apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
  annotations:
    argocd.argoproj.io/sync-wave: "11"
spec:
  acme:
    server: {{ .Values.issuer.acmeServer }}
    email: {{ .Values.issuer.email }}
    privateKeySecretRef:
      name: letsencrypt-prod-account-key
    solvers:
      - selector:
          dnsZones:
            - {{ .Values.wildcard.dnsZone }}
        dns01:
          cloudflare:
            apiTokenSecretRef:
              name: {{ .Values.issuer.cloudflareTokenSecret }}
              key: api-token
