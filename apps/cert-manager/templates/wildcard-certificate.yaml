apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .Values.wildcard.name }}
  namespace: {{ .Values.wildcard.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "12"
spec:
  secretName: {{ .Values.wildcard.secretName }}
  duration: 2160h    # 90d
  renewBefore: 360h  # 15d
  privateKey:
    algorithm: ECDSA
    size: 256
    rotationPolicy: Always
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  commonName: "*.{{ .Values.wildcard.dnsZone }}"
  dnsNames:
    - "*.{{ .Values.wildcard.dnsZone }}"
    - "{{ .Values.wildcard.dnsZone }}"
