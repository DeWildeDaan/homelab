{{- /*
PLACEHOLDER — regenerate before first cert-manager sync.

After the sealed-secrets controller is healthy:

  kubectl create secret generic {{ .Values.issuer.cloudflareTokenSecret }} \
    --namespace cert-manager \
    --from-literal=api-token='<YOUR_CLOUDFLARE_API_TOKEN>' \
    --dry-run=client -o yaml | \
  kubeseal --format=yaml \
    --controller-namespace=sealed-secrets \
    --controller-name=sealed-secrets-controller \
  > apps/cert-manager/templates/cloudflare-token-sealedsecret.yaml

The token needs these Cloudflare permissions, scoped to the daandewilde.be zone:
  - Zone:Zone:Read
  - Zone:DNS:Edit

Until this file is regenerated, the placeholder below will fail to unseal and
the ClusterIssuer will retry the DNS-01 challenge indefinitely (no permanent
breakage — it just means no cert).
*/ -}}
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: {{ .Values.issuer.cloudflareTokenSecret }}
  namespace: cert-manager
spec:
  encryptedData:
    api-token: REPLACE_ME_WITH_KUBESEAL_OUTPUT
  template:
    metadata:
      name: {{ .Values.issuer.cloudflareTokenSecret }}
      namespace: cert-manager
    type: Opaque
