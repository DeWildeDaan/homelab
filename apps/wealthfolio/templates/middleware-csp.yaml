# apps/wealthfolio/templates/middleware-csp.yaml
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: wealthfolio-csp-fix
  namespace: wealthfolio
spec:
  plugin:
    rewriteResponseHeaders:
      rewrites:
        - header: "Content-Security-Policy"
          regex: "frame-ancestors 'none'"
          replacement: "frame-ancestors 'self'"