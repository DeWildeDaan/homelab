apiVersion: v1
kind: Service
metadata:
  name: {{ include "wealthfolio.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "wealthfolio.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "wealthfolio.labels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http