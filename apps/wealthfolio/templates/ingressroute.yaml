apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ include "wealthfolio.fullname" . }}
  namespace: {{ .Release.Namespace }}
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`{{ .Values.ingress.host }}`)
      kind: Rule
      middlewares:
        - name: wealthfolio-csp-fix
      services:
        - name: {{ include "wealthfolio.fullname" . }}
          port: {{ .Values.service.port }}