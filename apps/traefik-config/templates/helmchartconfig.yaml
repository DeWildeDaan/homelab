apiVersion: helm.cattle.io/v1
kind: HelmChartConfig
metadata:
  name: traefik
  namespace: kube-system
spec:
  valuesContent: |-
    service:
      spec:
        loadBalancerIP: {{ .Values.traefik.loadBalancerIP }}
    ports:
      web:
        redirectTo:
          port: websecure
      websecure:
        tls:
          enabled: true
    tlsStore:
      default:
        defaultCertificate:
          secretName: {{ .Values.traefik.wildcardCertSecret }}
    additionalArguments:
      - "--experimental.plugins.traefik-oidc-auth.moduleName=github.com/sevensolutions/traefik-oidc-auth"
      - "--experimental.plugins.traefik-oidc-auth.version=v0.20.0"