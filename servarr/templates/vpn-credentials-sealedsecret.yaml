---
# Mullvad WireGuard credentials for the gluetun sidecar in the qBittorrent pod.
# Generate a WireGuard config at https://mullvad.net/en/account/wireguard-config,
# then seal the two fields with kubeseal --raw:
#
  # echo -n '<PrivateKey value>' | kubeseal \
  #   --controller-name sealed-secrets-controller \
  #   --controller-namespace sealed-secrets \
  #   --raw --namespace servarr --name servarr-vpn

  # echo -n '<Address value, e.g. 10.64.0.2/32>' | kubeseal \
  #   --controller-name sealed-secrets-controller \
  #   --controller-namespace sealed-secrets \
  #   --raw --namespace servarr --name servarr-vpn
#
# Paste each output below replacing REPLACE_ME_WITH_KUBESEAL_OUTPUT.
#
# Note: Mullvad dropped port-forwarding support in May 2023, so qBittorrent
# will run in passive (outgoing-only) connection mode. Downloads still work,
# seeding/throughput is reduced — acceptable trade for no-logs WG.
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: servarr-vpn
  namespace: {{ .Release.Namespace }}
spec:
  encryptedData:
    WIREGUARD_PRIVATE_KEY: 
    WIREGUARD_ADDRESSES: 
  template:
    metadata:
      name: servarr-vpn
      namespace: {{ .Release.Namespace }}
    type: Opaque
